<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}物料信息采集系统{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/main.js" defer></script>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="container">
        <header>
            <h1>📦 物料信息采集系统</h1>
            <nav class="main-nav">
                <a href="/" class="nav-link">🔍 物料查询</a>
                <a href="/materials" class="nav-link">📋 物料列表</a>
                <a href="/stats" class="nav-link">📊 分类统计</a>
            </nav>
            <div class="user-info">
                <span>当前用户: <strong id="currentUser">{{ username }}</strong></span>
            </div>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>

        <footer>
            <p>&copy; 2024 物料信息采集系统</p>
        </footer>
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
